<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mruby/edge Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: #2d2d30;
            padding: 20px 30px;
            border-bottom: 2px solid #007acc;
        }

        h1 {
            color: #e74c3c;
            font-size: 28px;
            font-weight: 600;
            margin: 0;
        }

        .subtitle {
            color: #9999;
            font-size: 14px;
            margin-top: 5px;
        }

        .editor-panel {
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        label {
            color: #d4d4d4;
            font-size: 14px;
            margin-bottom: 10px;
            display: block;
        }

        #codeInput {
            width: 100%;
            height: 300px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 14px;
            background: #252526;
            color: #d4d4d4;
            border: 2px solid #3c3c3c;
            border-radius: 6px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
        }

        #codeInput:focus {
            border-color: #007acc;
        }

        #runButton {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: #e74c3c;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            align-self: flex-start;
        }

        #runButton:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        #runButton:active {
            transform: translateY(0);
        }

        .console-panel {
            padding: 30px;
            background: #1a1a1a;
            border-top: 2px solid #3c3c3c;
        }

        .console-header {
            color: #d4d4d4;
            font-size: 14px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .console-title {
            font-weight: 600;
        }

        #clearButton {
            padding: 6px 15px;
            font-size: 12px;
            color: #d4d4d4;
            background: #3c3c3c;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #clearButton:hover {
            background: #4c4c4c;
        }

        #console {
            background: #0e0e0e;
            border: 2px solid #3c3c3c;
            border-radius: 6px;
            padding: 15px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .console-system {
            color: #569cd6;
            margin: 2px 0;
            font-weight: 500;
        }

        .console-output {
            color: #4ec9b0;
            margin: 2px 0;
        }

        .console-error {
            color: #f48771;
            margin: 2px 0;
            font-weight: 500;
        }

        .console-prompt {
            color: #858585;
            opacity: 0.7;
        }

        #console::-webkit-scrollbar {
            width: 8px;
        }

        #console::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        #console::-webkit-scrollbar-thumb {
            background: #3c3c3c;
            border-radius: 4px;
        }

        #console::-webkit-scrollbar-thumb:hover {
            background: #4c4c4c;
        }

        .footer {
            max-width: 1200px;
            margin: 20px auto 0;
            padding: 20px 30px;
            text-align: center;
            color: #d4d4d4;
            font-size: 14px;
        }

        .footer a {
            color: #569cd6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #4ec9b0;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>💻 mruby/edge Playground</h1>
            <div class="subtitle">Write and execute mruby code in your browser</div>
        </div>

        <div class="editor-panel">
            <label for="codeInput">💎 Ruby Code:</label>
            <textarea id="codeInput"
                placeholder="# Enter your mruby code here&#x0a;puts 'Hello, mruby!'&#x0a;&#x0a;x = [1, 2, 3, 4, 5]&#x0a;x.map { |n| n * 2 }">puts 'Hello, mruby!'
[1, 2, 3].map { |x| x * 2 }</textarea>
            <button id="runButton">▶ Run Code</button>
        </div>

        <div class="console-panel">
            <div class="console-header">
                <span class="console-title">📋 Console Output</span>
                <button id="clearButton">Clear</button>
            </div>
            <div id="console">
                <div class="console-prompt">Ready. Press "Run Code" to execute your mruby script.</div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Powered by <a href="https://github.com/mrubyedge/mrubyedge" target="_blank"
                rel="noopener noreferrer">mruby/edge</a></p>
    </footer>

    <script>
        const consoleDiv = document.getElementById('console');

        function appendToConsole(text, type = 'output') {
            const line = document.createElement('div');
            if (type === 'system') {
                line.className = 'console-system';
                line.textContent = `ℹ️  ${text}`;
            } else if (type === 'error') {
                line.className = 'console-error';
                line.textContent = `❌ ${text}`;
            } else {
                line.className = 'console-output';
                line.textContent = `   ${text}`;
            }
            consoleDiv.appendChild(line);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        function clearConsole() {
            consoleDiv.innerHTML = '';
        }

        document.getElementById('clearButton').addEventListener('click', clearConsole);

        var Module = {
            preRun: [],
            postRun: [],
            print: function (text) {
                console.log(text);
                appendToConsole(text, 'output');
            },
            printErr: function (text) {
                console.error(text);
                appendToConsole(text, 'error');
            },
            systemMessage: function (msgPtr) {
                const msg = UTF8ToString(msgPtr);
                console.info(msg);
                appendToConsole(msg, 'system');
            },
            onRuntimeInitialized: function () {
                document.getElementById('runButton').addEventListener('click', function () {
                    const codeInput = document.getElementById('codeInput').value;
                    if (!codeInput.trim()) {
                        appendToConsole('No code to execute', 'error');
                        return;
                    }

                    appendToConsole('Executing mruby script...', 'system');

                    // Call Rust function
                    try {
                        Module.ccall(
                            'load_ruby_script',
                            null,
                            ['string'],
                            [codeInput]
                        );
                    } catch (e) {
                        appendToConsole(`Execution failed: ${e.message}`, 'error');
                    }
                });
            }
        };
    </script>
    <script src="playground.js"></script>
</body>

</html>
