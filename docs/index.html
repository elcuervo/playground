<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mruby/edge Playground</title>
    <link rel="icon" type="image/x-icon" href="https://mrubyedge.github.io/playground/favicon.ico">

    <!-- OGP Meta Tags -->
    <meta property="og:title" content="mruby/edge Playground">
    <meta property="og:description"
        content="Write and execute mruby code in your browser. An interactive playground powered by mruby/edge and WebAssembly.">
    <meta property="og:image" content="https://mrubyedge.github.io/playground/ogp.png">
    <meta property="og:url" content="https://mrubyedge.github.io/playground/">
    <meta property="og:type" content="website">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="mruby/edge Playground">
    <meta name="twitter:description"
        content="Write and execute mruby code in your browser. An interactive playground powered by mruby/edge and WebAssembly.">
    <meta name="twitter:image" content="https://mrubyedge.github.io/playground/ogp.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            background: #e5e5e5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: #2d2d30;
            padding: 20px 30px;
            border-bottom: 2px solid #007acc;
        }

        h1 {
            color: #e74c3c;
            font-size: 28px;
            font-weight: 600;
            margin: 0;
        }

        .subtitle {
            color: #9999;
            font-size: 14px;
            margin-top: 5px;
        }

        .editor-panel {
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        label {
            color: #d4d4d4;
            font-size: 14px;
            margin-bottom: 10px;
            display: block;
        }

        .editor-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        #presetSelect {
            padding: 8px 12px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 13px;
            background: #252526;
            color: #d4d4d4;
            border: 2px solid #3c3c3c;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s;
        }

        #presetSelect:hover {
            border-color: #007acc;
        }

        #presetSelect:focus {
            border-color: #007acc;
        }

        #codeInput {
            width: 100%;
            height: 300px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 14px;
            background: #252526;
            color: #d4d4d4;
            border: 2px solid #3c3c3c;
            border-radius: 6px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
        }

        #codeInput:focus {
            border-color: #007acc;
        }

        #runButton {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: #e74c3c;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            align-self: flex-start;
        }

        #runButton:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        #runButton:active {
            transform: translateY(0);
        }

        .console-panel {
            padding: 30px;
            background: #1a1a1a;
            border-top: 2px solid #3c3c3c;
        }

        .console-header {
            color: #d4d4d4;
            font-size: 14px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .console-title {
            font-weight: 600;
        }

        #clearButton {
            padding: 6px 15px;
            font-size: 12px;
            color: #d4d4d4;
            background: #3c3c3c;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #clearButton:hover {
            background: #4c4c4c;
        }

        #console {
            background: #0e0e0e;
            border: 2px solid #3c3c3c;
            border-radius: 6px;
            padding: 15px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .console-system {
            color: #569cd6;
            margin: 2px 0;
            font-weight: 500;
            white-space: pre;
        }

        .console-output {
            color: #4ec9b0;
            margin: 2px 0;
            white-space: pre;
        }

        .console-error {
            color: #f48771;
            margin: 2px 0;
            font-weight: 500;
            white-space: pre;
        }

        .console-prompt {
            color: #858585;
            opacity: 0.7;
        }

        #console::-webkit-scrollbar {
            width: 8px;
        }

        #console::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        #console::-webkit-scrollbar-thumb {
            background: #3c3c3c;
            border-radius: 4px;
        }

        #console::-webkit-scrollbar-thumb:hover {
            background: #4c4c4c;
        }

        .footer {
            max-width: 1200px;
            margin: 20px auto 0;
            padding: 20px 30px;
            text-align: center;
            color: #333333;
            font-size: 14px;
        }

        .footer a {
            color: #569cd6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #4ec9b0;
            text-decoration: underline;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            margin: 0;
        }

        .release-notes-btn {
            background: #007acc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .release-notes-btn:hover {
            background: #005a9e;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            overflow: auto;
        }

        .modal-content {
            background: #1e1e1e;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #007acc;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            color: #e74c3c;
            margin: 0;
            font-size: 24px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #d4d4d4;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            line-height: 28px;
        }

        .close-btn:hover {
            color: #e74c3c;
        }

        .release-item {
            background: #252526;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #007acc;
        }

        .release-title {
            color: #4ec9b0;
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 8px 0;
        }

        .release-title a {
            color: #4ec9b0;
            text-decoration: none;
        }

        .release-title a:hover {
            color: #6ee7d2;
            text-decoration: underline;
        }

        .release-link {
            display: inline-block;
            margin-top: 10px;
            color: #569cd6;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .release-link:hover {
            color: #4ec9b0;
            text-decoration: underline;
        }

        .release-tag {
            color: #569cd6;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .release-date {
            color: #858585;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .release-body {
            color: #d4d4d4;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            color: #858585;
            padding: 20px;
        }

        .error {
            color: #f48771;
            padding: 20px;
            text-align: center;
        }

        /* Mobile responsive styles */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .container {
                border-radius: 0;
                box-shadow: none;
            }

            .header {
                padding: 15px;
                border-radius: 0;
            }

            .header-content {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .header-left h1 {
                font-size: 22px;
            }

            .subtitle {
                font-size: 13px;
            }

            .release-notes-btn {
                width: 100%;
                padding: 10px;
            }

            .editor-panel {
                padding: 0;
            }

            .editor-controls {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                padding: 15px 15px 10px 15px;
            }

            #presetSelect {
                width: 100%;
            }

            #codeInput {
                margin-left: 15px;
                margin-right: 15px;
                width: calc(100% - 30px);
            }

            .button-group {
                flex-direction: column;
                gap: 10px;
                padding: 10px 15px;
            }

            #runButton {
                width: calc(100% - 30px);
                margin: 20px 15px 15px;
            }

            .console-panel {
                padding: 0;
            }

            .console-header {
                padding: 15px 15px 10px 15px;
                justify-content: space-between;
            }

            #clearButton {
                width: 30%;
                min-width: 80px;
            }

            #console {
                border-radius: 0;
                border-left: none;
                border-right: none;
                padding: 10px 15px;
                margin: 0;
            }

            .modal-content {
                width: 95%;
                margin: 10% auto;
                padding: 20px;
            }

            .modal-header h2 {
                font-size: 20px;
            }

            .footer {
                padding: 15px;
                margin: 0;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="header-left">
                    <h1>💻 mruby/edge Playground</h1>
                    <div class="subtitle">Write and execute mruby code in your browser</div>
                </div>
                <button id="releaseNotesBtn" class="release-notes-btn">📺 Latest Releases</button>
            </div>
        </div>

        <div class="editor-panel">
            <div class="editor-controls">
                <label for="codeInput">💎 Ruby Code:</label>
                <select id="presetSelect">
                    <option value="">-- Load Sample Code --</option>
                    <option value="hello">Hello World</option>
                    <option value="fibonacci">Fibonacci Numbers</option>
                    <option value="hanoi">Tower of Hanoi</option>
                    <option value="sine">Sine Curve</option>
                    <option value="janken">Janken Game</option>
                    <option value="json">JSON Parse Sample</option>
                </select>
            </div>
            <textarea id="codeInput"
                placeholder="# Enter your mruby code here&#x0a;puts 'Hello, mruby!'&#x0a;&#x0a;x = [1, 2, 3, 4, 5]&#x0a;x.map { |n| n * 2 }">puts 'Hello, mruby!'
[1, 2, 3].map { |x| x * 2 }</textarea>
            <button id="runButton">▶ Run Code</button>
        </div>

        <div class="console-panel">
            <div class="console-header">
                <span class="console-title">📋 Console Output</span>
                <button id="clearButton">Clear</button>
            </div>
            <div id="console">
                <div class="console-prompt">Ready. Press "Run Code" to execute your mruby script.</div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Powered by <a href="https://github.com/mrubyedge/mrubyedge" target="_blank"
                rel="noopener noreferrer">mruby/edge</a></p>
    </footer>

    <!-- Release Notes Modal -->
    <div id="releaseNotesModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📺 Latest Releases</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div id="releaseNotesContent">
                <div class="loading">Loading release notes...</div>
            </div>
        </div>
    </div>

    <script>
        const consoleDiv = document.getElementById('console');
        const codeInput = document.getElementById('codeInput');
        const presetSelect = document.getElementById('presetSelect');

        // Release Notes Modal
        const releaseNotesBtn = document.getElementById('releaseNotesBtn');
        const releaseNotesModal = document.getElementById('releaseNotesModal');
        const closeModal = document.getElementById('closeModal');
        const releaseNotesContent = document.getElementById('releaseNotesContent');

        async function fetchReleaseNotes() {
            try {
                const response = await fetch('https://api.github.com/repos/mrubyedge/mrubyedge/releases');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const releases = await response.json();
                displayReleaseNotes(releases);
            } catch (error) {
                releaseNotesContent.innerHTML = `<div class="error">Failed to load release notes: ${error.message}</div>`;
            }
        }

        function displayReleaseNotes(releases) {
            if (releases.length === 0) {
                releaseNotesContent.innerHTML = '<div class="loading">No releases found.</div>';
                return;
            }

            const html = releases.slice(0, 10).map(release => {
                const date = new Date(release.published_at).toLocaleDateString('ja-JP', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                const body = release.body || 'No description available.';
                return `
                    <div class="release-item">
                        <h3 class="release-title"><a href="${release.html_url}" target="_blank" rel="noopener noreferrer">${release.name || release.tag_name}</a></h3>
                        <div class="release-tag">Tag: ${release.tag_name}</div>
                        <div class="release-date">Published: ${date}</div>
                        <div class="release-body">${body}</div>
                        <a href="${release.html_url}" target="_blank" rel="noopener noreferrer" class="release-link">View on GitHub →</a>
                    </div>
                `;
            }).join('');

            releaseNotesContent.innerHTML = html;
        }

        releaseNotesBtn.addEventListener('click', () => {
            releaseNotesModal.style.display = 'block';
            if (releaseNotesContent.innerHTML.includes('Loading')) {
                fetchReleaseNotes();
            }
        });

        closeModal.addEventListener('click', () => {
            releaseNotesModal.style.display = 'none';
        });

        window.addEventListener('click', (event) => {
            if (event.target === releaseNotesModal) {
                releaseNotesModal.style.display = 'none';
            }
        });

        // Sample code presets
        const presets = {
            hello: `# Hello World
puts "Hello, World!"
puts "Welcome to mruby/edge Playground!"`,

            fibonacci: `# Fibonacci Numbers
# Calculate first 15 Fibonacci numbers

def fibonacci(n)
  return n if n <= 1
  fibonacci(n - 1) + fibonacci(n - 2)
end

puts "Fibonacci sequence:"
15.times do |i|
  puts "fib(#{i}) = #{fibonacci(i)}"
end`,

            hanoi: `# Tower of Hanoi
# Move disks from source to destination using auxiliary peg

def print_state(state)
  puts "  A: #{state['A'].empty? ? '[]' : state['A'].inspect}"
  puts "  B: #{state['B'].empty? ? '[]' : state['B'].inspect}"
  puts "  C: #{state['C'].empty? ? '[]' : state['C'].inspect}"
end

def hanoi(n, source, destination, auxiliary, state, step = [0])
  if n == 1
    step[0] += 1
    disk = state[source].pop
    state[destination].push(disk)
    puts "Step #{step[0]}: Move disk #{disk} from #{source} to #{destination}"
    print_state(state)
    puts ""
    return
  end
  
  hanoi(n - 1, source, auxiliary, destination, state, step)
  step[0] += 1
  disk = state[source].pop
  state[destination].push(disk)
  puts "Step #{step[0]}: Move disk #{disk} from #{source} to #{destination}"
  print_state(state)
  puts ""
  hanoi(n - 1, auxiliary, destination, source, state, step)
end

puts "Tower of Hanoi with 3 disks:"
puts "----------------------------"
puts "Initial state:"
state = {'A' => [3, 2, 1], 'B' => [], 'C' => []}
print_state(state)
puts ""
hanoi(3, 'A', 'C', 'B', state)
puts "----------------------------"
puts "Complete!"`,

            sine: `# Sine curve ASCII art
# Draw sine wave from 0 to 4π

PI = Math::PI

# Settings
width = 60        # Width of the graph
x_range = 4.to_f * PI  # 0 to 4π
steps = 80        # Number of points to plot

puts "Sin(x) curve from 0 to 4π"
puts "=" * width
puts ""

# Draw the curve
(0..steps).each do |i|
  x = (x_range * i) / steps
  y = Math.sin(x)
  
  # Map y (-1 to 1) to column position (0 to width-1)
  col = ((y + 1) * (width - 1) / 2).to_i
  
  # Add x-axis marker at y=0
  line = if y.abs < 0.1
    " " * col + "|"
  else
    " " * col + "*"
  end
  
  # Show x value at specific points
  if i % 20 == 0
    x_label = (x / PI * 10).to_i / 10.0
    puts line + "  (x=#{x_label}π)"
  else
    puts line
  end
end

puts ""
puts "=" * width
puts "Legend: * = sin(x), | = x-axis (y≈0)"`,

            janken: `# Janken (Rock-Paper-Scissors) Game
# Simulated game between two players

class JankenGame
  HANDS = ['Rock', 'Paper', 'Scissors']
  
  def self.play_round
    player1 = HANDS[rand(HANDS.size)]
    player2 = HANDS[rand(HANDS.size)]
    
    puts "Player 1: #{player1}"
    puts "Player 2: #{player2}"
    
    result = judge(player1, player2)
    puts "Result: #{result}"
    puts ""
    result
  end
  
  def self.judge(hand1, hand2)
    return "Draw!" if hand1 == hand2
    
    wins = {
      'Rock' => 'Scissors',
      'Paper' => 'Rock',
      'Scissors' => 'Paper'
    }
    
    wins[hand1] == hand2 ? "Player 1 wins!" : "Player 2 wins!"
  end
end

puts "=== Janken Game ==="
puts ""

# Play 5 rounds
5.times do |i|
  puts "Round #{i + 1}:"
  JankenGame.play_round
end`,

            json: `# JSON Parse Sample
# Demonstrates JSON parsing with mruby-serde-json

# Sample JSON data
json_string = '{
  "name": "mruby/edge",
  "version": "1.1.0",
  "features": ["WASI", "Regexp", "Random"],
  "stats": {
    "stars": 100,
    "active": true
  }
}'

puts "Original JSON:"
puts json_string
puts ""

# Parse JSON
data = JSON.parse(json_string)

puts "Parsed data:"
puts "Name: #{data['name']}"
puts "Version: #{data['version']}"
puts "Features: #{data['features'].join(', ')}"
puts "Stars: #{data['stats']['stars']}"
puts "Active: #{data['stats']['active']}"
puts ""

# Create and stringify JSON
new_data = {
  'message' => 'Hello from mruby!',
  'numbers' => [1, 2, 3, 4, 5]
}

puts "New JSON:"
puts JSON.generate(new_data)`
        };

        // Handle preset selection
        presetSelect.addEventListener('change', function () {
            const selectedPreset = presets[this.value];
            if (selectedPreset) {
                codeInput.value = selectedPreset;
            }
            // Reset select to placeholder
            this.value = '';
        });

        function appendToConsole(text, type = 'output') {
            const line = document.createElement('div');
            if (type === 'system') {
                line.className = 'console-system';
                line.textContent = `ℹ️  ${text}`;
            } else if (type === 'error') {
                line.className = 'console-error';
                line.textContent = `❌ ${text}`;
            } else {
                line.className = 'console-output';
                line.textContent = `   ${text}`;
            }
            consoleDiv.appendChild(line);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        function clearConsole() {
            consoleDiv.innerHTML = '';
        }

        document.getElementById('clearButton').addEventListener('click', clearConsole);

        var Module = {
            preRun: [],
            postRun: [],
            print: function (text) {
                console.log(text);
                appendToConsole(text, 'output');
            },
            printErr: function (text) {
                console.error(text);
                appendToConsole(text, 'error');
            },
            systemMessage: function (msgPtr) {
                const msg = UTF8ToString(msgPtr);
                console.info(msg);
                appendToConsole(msg, 'system');
            },
            onRuntimeInitialized: function () {
                document.getElementById('runButton').addEventListener('click', function () {
                    const codeInput = document.getElementById('codeInput').value;
                    if (!codeInput.trim()) {
                        appendToConsole('No code to execute', 'error');
                        return;
                    }

                    appendToConsole('Executing mruby script...', 'system');

                    // Call Rust function
                    try {
                        Module.ccall(
                            'load_ruby_script',
                            null,
                            ['string'],
                            [codeInput]
                        );
                    } catch (e) {
                        appendToConsole(`Execution failed: ${e.message}`, 'error');
                    }
                });
            }
        };
    </script>
    <script src="playground.js"></script>
</body>

</html>
