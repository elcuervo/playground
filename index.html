<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust WASM Example</title>
</head>

<body>
    <h1>Rust WebAssembly (Emscripten) Demo</h1>
    <p>Open the browser console to see messages.</p>

    <div style="margin: 20px 0;">
        <label for="textInput">Enter text:</label><br>
        <input type="text" id="textInput" style="width: 300px; padding: 5px; margin: 10px 0;"
            placeholder="Enter text here">
        <br>
        <button id="countButton" style="padding: 10px 20px; cursor: pointer;">Count Characters</button>
    </div>

    <script>
        var Module = {
            preRun: [],
            postRun: [],
            print: function (text) {
                console.log(text);
            },
            printErr: function (text) {
                console.error(text);
            },
            onRuntimeInitialized: function () {
                // Set up button event listener after WASM module loading is complete
                document.getElementById('countButton').addEventListener('click', function () {
                    const inputText = document.getElementById('textInput').value;
                    // Call Rust function
                    Module.ccall(
                        'count_chars',  // Rust function name
                        null,           // Return type (none)
                        ['string'],     // Argument type (string)
                        [inputText]     // Argument value
                    );
                });
            }
        };
    </script>
    <script src="playground.js"></script>
</body>

</html>
